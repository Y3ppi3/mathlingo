<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>MathLingo - Лучший в мире способ учить математику</title>
  <script>
    (function() {
      var savedTheme = localStorage.getItem('theme');
      // ИСПРАВЛЕНО: .dark класс = светлая тема (соглашение проекта)
      if (savedTheme === 'light') {
        document.documentElement.classList.add('dark');
      } else if (savedTheme === 'dark') {
        document.documentElement.classList.remove('dark');
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        // Системная тёмная тема — убираем .dark, чтобы base-стили (тёмные) работали
        document.documentElement.classList.remove('dark');
      } else {
        // Системная светлая тема — добавляем .dark
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
